name: VisionLinkHue
options:
  bundleIdPrefix: com.visionlinkhue
  deploymentTarget:
    iOS: "18.0"
  creationAssemblyFlags:
    OTHER_CFLAGS: -DDEBUG=1
  generateAdditionalTargets: false
  groupSortPosition: top
  xcodeVersion: "16.0"

targets:
  VisionLinkHue:
    type: application
    platform: iOS
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        ENTITLEMENTS_DIRECTORY: .
        ENTITLEMENTS_FILENAME: VisionLinkHue.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 6.3
    sources:
      - VisionLinkHue
      - Assets.xcassets
      - Info.plist
      - VisionLinkHue.entitlements
    resources:
      - VisionLinkHue/Config/classification_rules.json
    dependencies: []

  VisionLinkHueTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        SWIFT_VERSION: 6.3
    sources:
      - Tests/VisionLinkHueTests
    dependencies:
      - target: VisionLinkHue

scheme:
  shared: false
  test:
    targets:
      VisionLinkHueTests: {}
